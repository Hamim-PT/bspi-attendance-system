{% extends 'base.html' %}

{% block content %}

<style>
    .container {
        max-width: 1100px;
        margin: 30px auto;
        padding: 0 20px;
    }

    .page-title {
        font-size: 30px;
        font-weight: 700;
        color: #f1f5f9;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .attendance-card {
        background: linear-gradient(145deg, #1e2937, #0f172a);
        border: 1px solid #334155;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.35);
    }

    .attendance-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }

    .attendance-table th,
    .attendance-table td {
        padding: 16px 18px;
        text-align: left;
    }

    .attendance-table th {
        font-size: 14px;
        text-transform: uppercase;
        color: #94a3b8;
        font-weight: 600;
        border-bottom: 2px solid #475569;
        background: rgba(15, 23, 42, 0.6);
    }

    .attendance-table tr {
        border-bottom: 1px solid #334155;
        transition: all 0.3s ease;
    }

    .attendance-table tr:hover {
        background: rgba(59, 130, 246, 0.1);
        transform: scale(1.01);
    }

    .student-link {
        color: #60a5fa;
        font-weight: 600;
        text-decoration: none;
        transition: color 0.3s;
    }

    .student-link:hover {
        color: #93c5fd;
        text-decoration: underline;
    }

    .checkbox {
        width: 22px;
        height: 22px;
        accent-color: #22c55e;
        cursor: pointer;
    }

    .submit-btn {
        padding: 14px 36px;
        border: none;
        border-radius: 14px;
        font-size: 16.5px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, #10b981, #34d399);
        color: white;
        box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
        transition: all 0.4s ease;
        width: 100%;
        max-width: 280px;
    }

    .submit-btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 30px rgba(16, 185, 129, 0.5);
    }

    .table-container {
        max-height: 65vh;
        overflow-y: auto;
        border-radius: 12px;
        border: 1px solid #334155;
    }
</style>

<div class="container">
    <h2 class="page-title"> {{ subject.name }} – Attendance</h2>

    <div class="attendance-card">
        <form method="post" action="{% url 'submit_attendance' subject.id %}">
            {% csrf_token %}

            <div class="table-container">
                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th style="text-align: center; width: 120px;">Present</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for student in students %}
                        <tr>
                            <td>
                                <a href="{% url 'student_detail' student.id %}" class="student-link">
                                    {{ student.name }}
                                </a>
                            </td>
                            <td style="text-align: center;">
                                <input type="checkbox" name="{{ student.id }}" class="checkbox">
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" style="text-align: center; padding: 40px; color: #64748b;">
                                No students found in this subject.
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <button type="submit" class="submit-btn">
                    ✅ Submit Attendance
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
