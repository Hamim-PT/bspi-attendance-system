{% extends 'base.html' %}
{% block content %}

<style>
    .container {
        max-width: 1100px;
        margin: 30px auto;
        padding: 0 20px;
    }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .page-header h2 {
        color: #f1f5f9;
        font-size: 28px;
        font-weight: 700;
        margin: 0;
    }

    .btn {
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #60a5fa);
        color: white;
        box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    }

    .btn-success {
        background: linear-gradient(135deg, #10b981, #34d399);
        color: white;
        box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
    }

    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        opacity: 1;
    }

    /* Subject Card - Modern Look */
    .subject-card {
        background: linear-gradient(145deg, #1e2937, #0f172a);
        border: 1px solid #334155;
        border-radius: 20px;
        padding: 24px 28px;
        margin-bottom: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.4s ease;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .subject-card:hover {
        transform: translateY(-8px);
        border-color: #60a5fa;
        box-shadow: 0 20px 40px rgba(59, 130, 246, 0.25);
    }

    .subject-name {
        font-size: 20px;
        font-weight: 700;
        color: #e2e8f0;
    }

    .subject-info {
        color: #94a3b8;
        font-size: 15px;
        margin-top: 4px;
    }

    .actions {
        display: flex;
        gap: 12px;
    }

    .actions a {
        padding: 12px 26px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 12px;
    }

    .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: #64748b;
        font-size: 18px;
    }

    .empty-state i {
        font-size: 48px;
        margin-bottom: 15px;
        opacity: 0.6;
    }
</style>

<div class="container">
    <div class="page-header">
        <h2> Subjects</h2>
        <div>
            <a href="{% url 'add_subject' %}" class="btn btn-primary">
                 Add Subject
            </a>
            <a href="{% url 'add_student' %}" class="btn btn-success">
                 Add Student
            </a>
        </div>
    </div>

    {% for subject in subjects %}
    <div class="subject-card">
        <div>
            <div class="subject-name">{{ subject.name }}</div>
            <div class="subject-info">Computer Science & Technology</div>
        </div>
        
        <div class="actions">
            <a href="{% url 'subject_students' subject.id %}" class="btn btn-secondary">
                 View Students
            </a>
            <a href="{% url 'submit_attendance' subject.id %}" class="btn btn-primary">
                 Give Attendance
            </a>
        </div>
    </div>
    {% empty %}
    <div class="empty-state">
        <i>📭</i>
        <p>No subjects found</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
